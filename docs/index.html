<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blip Support</title>
  <meta name="description" content="Support and privacy information for Blip: Barcode QR Keyboard.">
  <style>
    :root { color-scheme: light dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f6f8fb; color: #101828; }
    main { max-width: 760px; margin: 0 auto; padding: 56px 22px; }
    .card { background: #fff; border: 1px solid #d9e2ec; border-radius: 18px; padding: 30px; box-shadow: 0 18px 50px rgba(15, 23, 42, .08); }
    h1 { margin: 0 0 12px; font-size: clamp(34px, 7vw, 58px); letter-spacing: 0; }
    p { font-size: 18px; line-height: 1.55; color: #475467; }
    a { color: #007aff; font-weight: 650; text-decoration: none; }
    .links { display: grid; gap: 12px; margin-top: 28px; }
    .links a { display: block; padding: 14px 16px; border-radius: 12px; background: #eef6ff; }
    @media (prefers-color-scheme: dark) {
      body { background: #05070a; color: #f8fafc; }
      .card { background: #101318; border-color: #242a33; }
      p { color: #cbd5e1; }
      .links a { background: #111f35; }
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Blip</h1>
      <p>Support and privacy information for Blip: Barcode QR Keyboard.</p>
      <div class="links">
        <a href="support.html">Support</a>
        <a href="privacy.html">Privacy Policy</a>
      </div>
    </section>
  </main>
</body>
</html>
