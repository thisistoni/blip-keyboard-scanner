name: Blip
options:
  bundleIdPrefix: com.antoniobeslic
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 3TRF6L2MC2
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "NO"
targets:
  Blip:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antoniobeslic.Blip
        CODE_SIGN_ENTITLEMENTS: App/Blip.entitlements
        INFOPLIST_FILE: App/Info.plist
    dependencies:
      - target: BlipKeyboardExtension
        embed: true
  BlipKeyboardExtension:
    type: app-extension
    platform: iOS
    sources:
      - KeyboardExtension
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antoniobeslic.Blip.KeyboardExtension
        CODE_SIGN_ENTITLEMENTS: KeyboardExtension/BlipKeyboardExtension.entitlements
        INFOPLIST_FILE: KeyboardExtension/Info.plist
        APPLICATION_EXTENSION_API_ONLY: "YES"
schemes:
  Blip:
    build:
      targets:
        Blip: all
        BlipKeyboardExtension: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  BlipKeyboardExtension:
    build:
      targets:
        BlipKeyboardExtension: all
    run:
      config: Debug
